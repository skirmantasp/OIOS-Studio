<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OIOS Studio — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --border-color: #1e293b;
      --border-focus: #38bdf8;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --color-info: #38bdf8;
      --color-danger: #f87171;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: radial-gradient(circle at center, #1e293b 0%, var(--bg-primary) 70%);
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: rgba(17, 24, 39, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 36px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .login-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .login-logo {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .login-logo span {
      color: var(--color-info);
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-control {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
      width: 100%;
    }

    .input-control:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
    }

    .btn {
      background-color: var(--color-info);
      color: #0b0f19;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
    }

    .btn:hover {
      background-color: #7dd3fc;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(56, 189, 248, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error-banner {
      background-color: rgba(248, 113, 113, 0.1);
      border: 1px solid var(--color-danger);
      color: var(--color-danger);
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 8px;
      line-height: 1.4;
    }

    .spinner {
      border: 2px solid rgba(11, 15, 25, 0.2);
      border-top: 2px solid #0b0f19;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">OIOS <span>STUDIO</span></div>
        <div class="login-subtitle">Internal Workspace Access Control</div>
      </div>

      <div class="error-banner" id="error-banner">
        Incorrect password. Please try again.
      </div>

      <form id="login-form">
        <div class="form-group" style="margin-bottom: 20px;">
          <label for="password">Workspace Password</label>
          <input type="password" id="password" class="input-control" placeholder="Enter secure password" required autofocus>
        </div>

        <button type="submit" id="submit-btn" class="btn">
          <span class="spinner" id="btn-spinner"></span>
          <span id="btn-text">Authenticate Access</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const errorBanner = document.getElementById('error-banner');
    const submitBtn = document.getElementById('submit-btn');
    const spinner = document.getElementById('btn-spinner');
    const btnText = document.getElementById('btn-text');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset state
      errorBanner.style.display = 'none';
      submitBtn.disabled = true;
      spinner.style.display = 'inline-block';
      btnText.textContent = 'Authenticating...';

      const password = passwordInput.value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });

        if (response.ok) {
          // Redirect to the dashboard
          window.location.href = '/studio';
        } else {
          const errData = await response.json();
          errorBanner.textContent = errData.error || 'Authentication failed.';
          errorBanner.style.display = 'flex';
          submitBtn.disabled = false;
          spinner.style.display = 'none';
          btnText.textContent = 'Authenticate Access';
          passwordInput.value = '';
          passwordInput.focus();
        }
      } catch (err) {
        errorBanner.textContent = 'Server connection error. Please check your network.';
        errorBanner.style.display = 'flex';
        submitBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Authenticate Access';
      }
    });
  </script>
</body>
</html>
